name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build hatchling

      - name: Build sdist and wheel
        run: python -m build

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256
        id: sha
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clone tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/thomasqbrady/homebrew-remarkable.git tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update formula
        run: |
          cd tap
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" Formula/rmcal.rb
          sed -i "s|/tags/v[0-9.]*\.tar\.gz|/tags/${{ steps.sha.outputs.tag }}.tar.gz|" Formula/rmcal.rb

      - name: Commit and push
        run: |
          cd tap
          git add Formula/rmcal.rb
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update rmcal to ${{ steps.sha.outputs.tag }}" && git push)
